title: Holeman's Dev Blog
description: 백엔드 개발 기록
url: "https://holeman79.github.io"
baseurl: ""

# Theme
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

# Pagination
paginate: 10
paginate_path: /page:num/

# Author
author:
  name: "holeman79"
  bio: "Backend Developer"
  location: "South Korea"

# Category
category_archive:
  type: liquid
  path: /categories/

# Comments (Giscus)
comments:
  provider: "giscus"
  giscus:
    repo_id: ""
    category_name: "Blog Comments"
    category_id: ""
    mapping: "pathname"
    reactions_enabled: "1"
    theme: "light"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
