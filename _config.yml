title: Holeman's Dev Blog
description: 백엔드 개발 기록
url: "https://holeman79.github.io"
baseurl: ""

# Theme
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"
future: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-remote-theme

# Pagination
paginate: 10
paginate_path: /page:num/

# Author
author:
  name: "holeman79"
  bio: "Backend Developer"
  avatar: "/assets/images/avatar.png"
  location: "South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/holeman79"

# Category
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# Comments (Giscus)
comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDOSAtlng"
    category_name: "General"
    category_id: "DIC_kwDOSAtlns4C6sCk"
    mapping: "pathname"
    reactions_enabled: "1"
    theme: "dark"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
      sidebar:
        nav: "sidebar-categories"
  - scope:
      path: ""
      type: pages
    values:
      sidebar:
        nav: "sidebar-categories"
