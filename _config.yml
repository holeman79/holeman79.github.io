title: Holeman's Dev Blog
description: 백엔드 개발 기록
url: "https://holeman79.github.io"
baseurl: ""

# Theme
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 10
paginate_path: /page:num/

# Author
author:
  name: "holeman79"
  bio: "Backend Developer"
  location: "South Korea"

# Category
category_archive:
  type: liquid
  path: /categories/

# Comments (Giscus)
comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDOSAtlng"
    category_name: "General"
    category_id: "DIC_kwDOSAtlns4C6sCk"
    mapping: "pathname"
    reactions_enabled: "1"
    theme: "light"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
